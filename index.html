<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutri Detective - Horror Investigation Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
background:#050505;
color:#eee;
font-family:'Source Sans 3',sans-serif;
height:100vh;overflow:hidden;
}
body:before{
content:"";position:fixed;inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(120,0,0,.15), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(120,0,0,.1), transparent 35%),
linear-gradient(#0b0b0b,#000);
animation:breathe 8s infinite alternate;
z-index:-3;
}
body:after{
content:"";position:fixed;inset:0;
background:repeating-linear-gradient(to bottom,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);
pointer-events:none;
opacity:.5;
}
@keyframes breathe{from{filter:brightness(.9)}to{filter:brightness(1.1)}}
.container{display:flex;height:100vh}
.sidebar{
width:280px;background:#080808;border-right:1px solid #2b1111;padding:24px;
}
.logo{
font-family:'Cormorant Garamond',serif;
font-size:38px;color:#b91c1c;letter-spacing:2px;
margin-bottom:10px;
}
.sub{font-size:12px;letter-spacing:3px;color:#777;margin-bottom:25px}
.file{padding:10px;border:1px solid #222;margin-bottom:8px;border-radius:8px;color:#888}
.active{border-color:#b91c1c;color:#fff;background:#140909}
.main{flex:1;padding:40px;overflow:auto;position:relative}
.title{
font-family:'Cormorant Garamond',serif;
font-size:52px;color:#d1d5db;
text-shadow:2px 2px 0 #400;
}
.warning{color:#b91c1c;letter-spacing:4px;font-size:12px;margin-bottom:12px}
.story{margin-top:20px;font-size:22px;line-height:1.9;min-height:220px;white-space:pre-line}
img.evidence{
width:100%;max-width:700px;border-radius:12px;margin:25px 0;
filter:grayscale(100%) sepia(20%) brightness(.7) contrast(1.2);
animation:zoom 20s infinite alternate;
}
@keyframes zoom{from{transform:scale(1)}to{transform:scale(1.08)}}
.question{background:#0a0a0a;border:1px solid #222;padding:20px;border-radius:12px}
.option, .btn{
display:block;width:100%;margin-top:10px;padding:14px;border:none;border-radius:10px;
background:#1a1a1a;color:#fff;cursor:pointer;font-size:18px;
}
.option:hover,.btn:hover{background:#2b1111}
.msg{margin-top:15px;padding:15px;border-radius:10px}
.good{background:#0f2a16}
.bad{background:#3a1010}
.shake{animation:shake .35s}
@keyframes shake{
0%{transform:translateX(0)}25%{transform:translateX(-8px)}
50%{transform:translateX(8px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<div class="logo">CASE FILES</div>
<div class="sub">NUTRI DETECTIVE DATABASE</div>
<div id="files"></div>
</div>
<div class="main">
<div class="warning">CONFIDENTIAL INVESTIGATION FILE</div>
<div id="title" class="title"></div>
<div id="story" class="story"></div>
<img id="img" class="evidence" />
<div id="area"></div>
</div>
</div>
<script>
const steps=[
{title:"Opening",img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?q=80&w=1200",
text:`9:36 PM. Backstage of the school's healthy eating expo.

Anthony suddenly collapsed, clutching his side.

"It feels like knives inside me."

Twenty minutes later he was in the emergency room.

A half-finished green smoothie remained on the table.

Your mission: discover what the drink was hiding.`},
{title:"Investigation — Crime Scene",img:"https://images.unsplash.com/photo-1498837167922-ddd27525d352?q=80&w=1200",
text:`Evidence:
• 1L green smoothie
• Almonds
• Dark chocolate
• Three empty spinach bags

Everything looks healthy.`,
q:"What can be concluded?",
o:["Food poisoning","Poisoning","Stomach flu","More evidence needed"],a:3,
e:"Detectives do not jump to conclusions from a single clue."},
{title:"Investigation — Symptoms",img:"https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1200",
text:`Hospital report:
• Severe one-sided pain
• Blood in urine
• No fever
• Nobody else became sick`,
q:"Most likely category?",
o:["Food poisoning","Kidney stone issue","Allergy","Cold drink pain"],a:1,
e:"The symptoms fit urinary tract or kidney stone problems."},
{title:"Investigation — Hidden Pattern",img:"https://images.unsplash.com/photo-1505751172876-fa1923c5c528?q=80&w=1200",
text:`The smoothie contained spinach, almond milk, cocoa powder, beetroot powder and vitamin C supplements every day.`,
q:"Most scientific concern?",
o:["Food incompatibility","One smoothie always causes stones","Repeated high-oxalate intake","Bananas are toxic"],a:2,
e:"The issue is dosage and frequency, not magical food combinations."},
{title:"Investigation — Lifestyle",img:"https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=1200",
text:`Anthony trained basketball for hours and drank very little water.`,
q:"Why is this important?",
o:["Urine becomes concentrated","Basketball creates oxalate","Smoothies replace water","Heat creates poison"],a:0,
e:"Dehydration increases stone formation risk."},
{title:"Investigation — Final Deduction",img:"https://images.unsplash.com/photo-1530026405186-ed1f139313f8?q=80&w=1200",
text:`CT scans revealed calcium oxalate kidney stones.`,
q:"What caused the incident?",
o:["Poisoning","Food incompatibility","High oxalate intake + dehydration","Stress"],a:2,
e:"Case solved. Nutrition imbalance and dehydration triggered the condition."},
{title:"Key Takeaways",img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1200",
text:`• Healthy foods still depend on dosage.
• Smoothies can hide massive intake.
• Hydration matters.
• Supplements are not automatically harmless.
• Nutrition is about balance.

Investigation Closed.`}
];
let i=0;
function sidebar(){
files.innerHTML="";
steps.forEach((s,n)=>{
let d=document.createElement("div");
d.className="file"+(n===i?" active":"");
d.textContent=s.title;
files.appendChild(d);
});
}
function type(text,el){
el.textContent=""; let p=0;
(function t(){ if(p<text.length){el.textContent+=text[p++]; setTimeout(t,12);} })();
}
function render(){
sidebar();
let s=steps[i];
title.textContent=s.title;
type(s.text,story);
img.src=s.img;
area.innerHTML="";
if(!s.q){
let b=document.createElement("button");
b.className="btn";
b.textContent=i===steps.length-1?"REOPEN INVESTIGATION":"CONTINUE";
b.onclick=()=>{i=i===steps.length-1?0:i+1;render();};
area.appendChild(b); return;
}
let q=document.createElement("div"); q.className="question";
q.innerHTML="<h3>"+s.q+"</h3>";
s.o.forEach((op,n)=>{
let bt=document.createElement("button");
bt.className="option"; bt.textContent=op;
bt.onclick=()=>{
if(n===s.a){
area.innerHTML='<div class="msg good">'+s.e+'</div>';
let c=document.createElement("button");
c.className="btn"; c.textContent="CONTINUE";
c.onclick=()=>{i++;render();};
area.appendChild(c);
}else{
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),350);
area.innerHTML+='<div class="msg bad">Incorrect deduction. Review the evidence.</div>';
}
};
q.appendChild(bt);
});
area.appendChild(q);
}
render();
</script>
</body>
</html>
