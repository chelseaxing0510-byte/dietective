<html lang="en">
<head>
<meta charset="UTF-8">

<title>Dietective - Horror Investigation Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
background:#050505;
color:#eee;
font-family:'Cormorant Garamond',serif;
height:100vh;
overflow:hidden;
}
body:before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(120,0,0,.15), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(120,0,0,.1), transparent 35%),
linear-gradient(#0b0b0b,#000);
animation:breathe 8s infinite alternate;
z-index:-3;
}
body:after{
content:"";
position:fixed;
inset:0;
background:repeating-linear-gradient(to bottom,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);
pointer-events:none;
opacity:.5;
}
@keyframes breathe{from{filter:brightness(.9)}to{filter:brightness(1.1)}}
.container{display:flex;height:100vh}
.sidebar{
width:280px;
background:#080808;
border-right:1px solid #2b1111;
padding:24px;
overflow:auto;
}
.logo{
font-size:38px;
color:#b91c1c;
letter-spacing:2px;
margin-bottom:10px;
font-weight:700;
}
.sub{font-size:12px;letter-spacing:3px;color:#777;margin-bottom:25px}
.file{
padding:10px;
border:1px solid #222;
margin-bottom:8px;
border-radius:8px;
color:#888;
cursor:pointer;
}
.file:hover{border-color:#5a1515;color:#ddd}
.active{border-color:#b91c1c;color:#fff;background:#140909}
.locked{opacity:.35;cursor:not-allowed}
.main{
flex:1;
padding:40px;
overflow:auto;
position:relative;
}
.warning{color:#b91c1c;letter-spacing:4px;font-size:12px;margin-bottom:12px}
.title{
font-size:52px;
color:#d1d5db;
text-shadow:2px 2px 0 #400;
font-weight:700;
}
.story{
margin-top:20px;
font-size:22px;
line-height:1.9;
min-height:220px;
white-space:pre-line;
}
img.evidence{
width:100%;
max-width:700px;
border-radius:12px;
margin:25px 0;
filter:grayscale(100%) sepia(20%) brightness(.7) contrast(1.2);
animation:zoom 20s infinite alternate;
}
@keyframes zoom{from{transform:scale(1)}to{transform:scale(1.08)}}
.question{
background:#0a0a0a;
font-family:'Cormorant Garamond',serif;
border:1px solid #222;
padding:20px;
border-radius:12px;
font-size:21px;
}
.option,.btn{
display:block;
width:100%;
margin-top:10px;
padding:14px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:#fff;
cursor:pointer;
font-size:20px;
font-family:'Cormorant Garamond',serif;
}
.option:hover,.btn:hover{background:#2b1111}
.option:disabled{opacity:.65;cursor:not-allowed}
.option.correct{background:#0f2a16;border:1px solid #2f8f46}
.option.wrong{background:#3a1010;border:1px solid #842020}
.msg{margin-top:15px;padding:15px;border-radius:10px;white-space:pre-line}
.good{background:#0f2a16}
.bad{background:#3a1010}
.shake{animation:shake .35s}
@keyframes shake{
0%{transform:translateX(0)}25%{transform:translateX(-8px)}
50%{transform:translateX(8px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}
}

/* Case selection landing page */
.case-select-mode{
background:
radial-gradient(circle at 50% 0%, rgba(185,28,28,.20), transparent 35%),
linear-gradient(135deg, rgba(20,0,0,.6), #000 55%);
}
.case-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:28px;
margin-top:35px;
max-width:980px;
}
.case-card{
background:#090909;
border:1px solid #3a1010;
border-radius:16px;
overflow:hidden;
cursor:pointer;
box-shadow:0 0 25px rgba(185,28,28,.12);
transition:.25s;
}
.case-card:hover{
transform:translateY(-6px);
border-color:#b91c1c;
box-shadow:0 0 40px rgba(185,28,28,.25);
}
.case-card img{
width:100%;
height:210px;
object-fit:cover;
display:block;
filter:grayscale(100%) sepia(30%) brightness(.55) contrast(1.35);
}
.case-card-body{padding:20px}
.case-card h2{
font-size:30px;
color:#f3f4f6;
margin-bottom:8px;
}
.case-card p{
font-size:18px;
color:#aaa;
line-height:1.45;
}
.case-select-title{
font-size:64px;
color:#f3f4f6;
text-shadow:3px 3px 0 #400;
}
.case-select-subtitle{
font-size:0;
margin:0;
height:0;
overflow:hidden;
}

/* Opening = incident report */
.main.opening-mode{
background:
radial-gradient(circle at 15% 10%, rgba(185,28,28,.35), transparent 18%),
linear-gradient(135deg, rgba(70,0,0,.28), rgba(0,0,0,.95) 45%),
repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 5px);
}
.opening-mode .warning{
color:#ff4d4d;
border:1px solid #5a1515;
display:inline-block;
padding:8px 12px;
background:rgba(70,0,0,.25);
box-shadow:0 0 20px rgba(185,28,28,.25);
}
.opening-mode .title{
font-size:60px;
color:#f3f4f6;
border-bottom:1px solid #5a1515;
padding-bottom:14px;
max-width:850px;
}
.opening-mode .title:before{
content:"INCIDENT REPORT";
display:block;
font-size:14px;
letter-spacing:6px;
color:#ff4d4d;
margin-bottom:10px;
}
.opening-mode .story{
font-size:27px;
line-height:1.75;
background:rgba(10,10,10,.72);
border:1px solid #441111;
border-left:6px solid #b91c1c;
padding:28px;
max-width:900px;
box-shadow:0 0 35px rgba(185,28,28,.18);
}
.opening-mode img.evidence{
max-width:760px;
border:1px solid #5a1515;
filter:grayscale(100%) sepia(35%) brightness(.45) contrast(1.55) blur(.2px);
box-shadow:0 0 45px rgba(185,28,28,.18);
}
.opening-mode .btn{
max-width:360px;
letter-spacing:3px;
border:1px solid #b91c1c;
background:#240707;
}

/* Investigation = evidence board */
.main.investigation-mode{
background:
linear-gradient(180deg, rgba(255,255,255,.015), transparent 35%),
radial-gradient(circle at 30% 25%, rgba(120,0,0,.10), transparent 35%);
}
.investigation-mode .title:before{
content:"// EVIDENCE REVIEW";
display:block;
font-size:13px;
letter-spacing:5px;
color:#b91c1c;
margin-bottom:8px;
}

/* Key Takeaways = case closed file */
.main.takeaway-mode{
background:
linear-gradient(90deg, rgba(80,0,0,.55), rgba(0,0,0,.95) 42%),
radial-gradient(circle at 80% 15%, rgba(255,0,0,.22), transparent 22%),
repeating-linear-gradient(90deg, rgba(255,255,255,.018) 0 1px, transparent 1px 6px);
}
.takeaway-mode .warning{display:none}
.takeaway-mode .title{
font-size:68px;
color:#f9fafb;
background:#190606;
border:2px solid #7f1d1d;
padding:20px 26px;
display:inline-block;
transform:rotate(-1deg);
box-shadow:0 0 35px rgba(185,28,28,.25);
}
.takeaway-mode .title:before{
content:"CASE CLOSED / NUTRITION NOTES";
display:block;
font-size:14px;
letter-spacing:6px;
color:#ff6b6b;
margin-bottom:8px;
}
.takeaway-mode .story{
margin-top:34px;
background:linear-gradient(#120707,#080808);
border:2px solid #5a1515;
border-top:10px solid #7f1d1d;
border-radius:4px;
padding:32px 36px;
box-shadow:0 0 45px rgba(185,28,28,.24);
font-size:22px;
line-height:1.85;
max-width:920px;
}
.takeaway-mode img.evidence{display:none}
.takeaway-mode .btn{
max-width:360px;
margin-top:28px;
background:#5a1515;
border:1px solid #ff6b6b;
letter-spacing:3px;
}
.takeaway-mode .btn:hover{background:#7f1d1d}
.question h3{
font-family:'Cormorant Garamond',serif !important;
font-size:28px;
font-weight:400;
}
.option{
font-family:'Cormorant Garamond',serif !important;
font-weight:400 !important;
letter-spacing:0 !important;
text-transform:none !important;
}

.played-badge{
display:inline-block;
margin-top:10px;
padding:5px 9px;
border:1px solid #2f8f46;
border-radius:999px;
background:#0f2a16;
color:#c7f9d4;
font-size:15px;
letter-spacing:1px;
}
.file.completed{
border-color:#2f8f46;
color:#c7f9d4;
}
.score-panel{
margin-top:24px;
background:#090909;
border:2px solid #5a1515;
border-left:8px solid #b91c1c;
border-radius:12px;
padding:24px;
max-width:760px;
box-shadow:0 0 35px rgba(185,28,28,.20);
}
.score-panel h2{
font-size:38px;
margin-bottom:12px;
color:#f3f4f6;
}
.score-panel p{
font-size:24px;
line-height:1.6;
color:#ddd;
}
.score-number{
font-size:54px;
color:#ff6b6b;
font-weight:700;
}


.game-intro{
margin-top:22px;
max-width:880px;
background:rgba(10,10,10,.72);
border:1px solid #3a1010;
border-left:6px solid #b91c1c;
border-radius:14px;
padding:20px 24px;
box-shadow:0 0 30px rgba(185,28,28,.14);
}
.game-intro p{
font-size:23px;
line-height:1.55;
color:#ddd;
margin-bottom:12px;
}
.game-intro p:last-child{
margin-bottom:0;
}

</style>
</head>

<script>
const cases=[
{
caseTitle:"Attempted Murder by a Green Smoothie",
caseLabel:"Case 1",
id:"case1_green_smoothie",
cover:"https://images.unsplash.com/photo-1498837167922-ddd27525d352?q=80&w=1200",
summary:"A healthy drink hides a dangerous nutrition pattern.",
steps:[
{title:"Opening",img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?q=80&w=1200",
text:`9:36 PM. Backstage of the school's sustainable food exhibition.

Anthony suddenly crouched down, clutching the right side of his abdomen. His face turned pale.

"It feels like knives are cutting inside me," he kept saying.

Twenty minutes later, he was taken to the emergency room.

Medical notes:

- Severe abdominal and flank pain
- Nausea
- Blood in urine

Only one unfinished green smoothie remained on the table.

A label on the bottle read:

"All Natural"
"No Sugar"
"Antioxidant"
"Detox"

MISSION:

Find out what this "healthy drink" was really hiding.`},

{title:"Investigation 1",img:"https://images.unsplash.com/photo-1498837167922-ddd27525d352?q=80&w=1200",
text:`Evidence found backstage:

- One 1L green smoothie
- One bag of almonds
- Half a bar of 85% dark chocolate
- A card labeled "No Sugar Challenge - Day 6"
- Three empty spinach packages in the trash

Everything looked healthy.`,
q:"Based on these clues, Anthony's illness is:",
o:["Food poisoning","Deliberate poisoning","Stomach flu","Not enough evidence yet"],a:3,
e:`Detectives should never jump to conclusions from a single clue.

Food poisoning usually affects multiple people. Poisoning requires evidence of suspicious substances. Stomach flu must also match the symptoms.`},

{title:"Investigation 2",img:"https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1200",
text:`Hospital records:

- Severe one-sided flank pain
- Pain came in waves
- Nausea
- Blood in urine
- No fever
- No group vomiting or diarrhea`,
q:"What type of problem does this resemble?",
o:["Food poisoning","Kidney stone or urinary system problem","Spinach allergy","Stomach pain caused by cold drinks"],a:1,
e:`The key is not simply what he ate.

Pain location, blood in urine, and whether multiple people became sick are much more important.

A single person with severe flank pain and blood in urine does not resemble typical food poisoning.`},

{title:"Investigation 3",img:"https://images.unsplash.com/photo-1505751172876-fa1923c5c528?q=80&w=1200",
text:`One classmate said:

"I figured it out! Spinach and milk cannot be eaten together. The internet says they cause kidney stones!"

Smoothie recipe:

- 250 g spinach
- 400 mL almond milk
- 1 banana
- 2 spoons of cocoa powder
- 1 spoon of chia seeds
- 1 spoon of beetroot powder
- 1 vitamin C tablet
- Ice`,
q:"What is the most scientific concern?",
o:["Spinach and milk should never be consumed together","One spinach smoothie always causes kidney stones","Multiple high-oxalate ingredients were consumed in large amounts for many days","Bananas and cocoa powder are incompatible"],a:2,
e:`The issue is dosage and frequency, not food incompatibility.

Occasionally eating spinach or drinking milk is usually fine.

The problem is consuming large amounts of spinach, almonds, cocoa, and beetroot every day in a 1L smoothie.`},

{title:"Investigation 4",img:"https://images.unsplash.com/photo-1528825871115-3581a5387919?q=80&w=1200",
text:`Shopping records:

Day 1 to Day 6:
One large bag of spinach purchased every day.

Anthony posted online:

"Eating vegetables normally is too difficult. Blending everything into a smoothie is much easier."

A friend added:

"He could never eat this much food in a normal meal, but he could drink it easily."`,
q:"Why does blending food into a smoothie change the risk?",
o:["Blending makes food poisonous","Liquids make it easier to consume large amounts quickly","Smoothies have no nutrients","Green foods are dangerous"],a:1,
e:`Smoothies can hide extremely large amounts of food.

A plate of spinach might feel impossible to finish, but a large smoothie can be consumed in minutes.`},

{title:"Investigation 5",img:"https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=1200",
text:`Weekly schedule:

- Basketball training for two hours every afternoon
- Often skipped dinner and only drank smoothies afterward
- Daily water intake: approximately 600-800 mL
- Believed smoothies counted as water
- Very hot weather recently`,
q:"Why is this clue important?",
o:["Heavy sweating and low water intake make urine more concentrated","Basketball turns spinach into oxalate","Smoothies completely replace water","Hot weather creates food incompatibility"],a:0,
e:`Kidney stone risk depends not only on food, but also on hydration.

Concentrated urine makes crystal formation more likely.`},

{title:"Investigation 6",img:"https://images.unsplash.com/photo-1550572017-edd951aa8f72?q=80&w=1200",
text:`More dietary records revealed:

- Anthony stopped drinking milk
- He avoided cheese and yogurt because he feared gaining weight
- He used almond milk that contained no added calcium
- He believed:

"Kidney stones contain calcium, so eating less calcium must be safer."`,
q:"Why is this idea incorrect?",
o:["All calcium becomes kidney stones","Completely avoiding calcium is best","Adequate calcium can bind oxalate in the intestine and reduce absorption","Almond milk is always more dangerous than regular milk"],a:2,
e:`Calcium is not automatically the enemy.

Adequate dietary calcium can actually reduce oxalate absorption.`},

{title:"Investigation 7",img:"https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?q=80&w=1200",
text:`Anthony added one vitamin C tablet to his smoothie every day.

He said:

"Antioxidants are healthy, so more must be better."`,
q:"How should this clue be interpreted?",
o:["Vitamin C is poisonous","Vitamins should never be consumed","High-dose vitamin C supplements may increase risk in people prone to kidney stones","Vitamin C is incompatible with spinach"],a:2,
e:`The issue is:

Additional supplements + high doses + existing risk factors.

For certain individuals, excessive vitamin C supplementation may increase kidney stone risk.`},

{title:"Final Unravel",img:"https://images.unsplash.com/photo-1530026405186-ed1f139313f8?q=80&w=1200",
text:`Hospital examination showed:

CT scan:
Small kidney stones detected.

Urinalysis:
Elevated red blood cells.

Stone composition:
Calcium oxalate.

The doctor asked:

"Have you recently consumed large amounts of spinach, nuts, chocolate, beetroot, or very little water?"

Anthony fell silent.`,
q:"What really caused the incident?",
o:["Spinach and milk poisoning","Someone poisoned the smoothie","High-oxalate diet + dehydration + heavy sweating + calcium misconception + supplement stacking","Psychological stress"],a:2,
e:"Correct."},

{title:"Key Takeaways",img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1200",
text:`- Eating healthy depends on dosage.
- Blending food into liquid can hide the true amount consumed.
- Calcium in kidney stones does not mean calcium itself is the enemy.
- Supplements are not always better in larger amounts.
- Nutrition is about overall dietary patterns, not labeling foods as simply good or bad.`}
]
},
{
caseTitle:"Blue Lips at the Gym",
caseLabel:"Case 2",
id:"case2_blue_lips",
cover:"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?q=80&w=1200",
summary:"A workout turns dangerous after caffeine, fasting, sweat, and heat collide.",
steps:[
{title:"Opening",img:"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?q=80&w=1200",
text:`8:12 PM. At a gym near campus.

Kristine had just finished his fourth set of burpees when he suddenly grabbed the treadmill and crouched down.

His face turned pale. His hands would not stop shaking.

"My heart is beating way too fast," he said.

Ten minutes late`},

{title:"Investigation 1",img:"https://images.unsplash.com/photo-1593079831268-3381b0db4a77?q=80&w=1200",
text:`Investigators found:

- Half a bottle of pre-workout
- Two empty energy drink cans
- An unfinished protein bar
- A completely soaked workout shirt
- Training records showing:

Before workout: 68.2 kg

After workout: 66.9 kg`,
q:"What appears most suspicious at first glance?",
o:["The protein bar","The energy drinks and pre-workout","The wet workout shirt","Everything deserves further investigation"],a:3,
e:`Good investigators avoid focusing on only one clue.

At this stage, every piece of evidence matters.

Exercise symptoms may result from multiple factors acting together, so premature conclusions can easily lead investigators in the wrong direction.`},

{title:"Investigation 2",img:"https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1200",
text:`Emergency room notes:

- Rapid heartbeat
- Shaking hands
- Chest discomfort
- Dizziness
- No rash
- No throat swelling
- No group illness`,
q:"Which explanation seems least likely?",
o:["Excessive caffeine stimulation","Dehydration","Severe food allergy","Post-exercise low blood sugar"],a:2,
e:`Severe allergic reactions often involve symptoms such as rash, throat swelling, or difficulty breathing.

The current evidence points more toward cardiovascular and metabolic stress rather than an allergic reaction.`},

{title:"Investigation 3",img:"https://images.unsplash.com/photo-1593095948071-474c5cc2989d?q=80&w=1200",
text:`One friend said:

"He recently started using protein powder. Maybe protein damaged his kidneys or poisoned him?"

Investigators discovered:

- He did not drink protein powder that day.
- He only ate one bite of the protein bar.
- His pre-workout contained 300 mg of caffeine per scoop.
- Each energy drink contained 160 mg of caffeine.
- He consumed two cans that day.`,
q:"Which factor is actually more important?",
o:["Protein intake","Total caffeine intake","The flavor of the protein bar","The zero-sugar label"],a:1,
e:`Many people immediately blame protein powder.

However, the more dangerous factor in this case was the combined caffeine intake.

One scoop of pre-workout plus two energy drinks produced a level of stimulation far beyond his usual tolerance.`},

{title:"Investigation 4",img:"https://images.unsplash.com/photo-1526401485004-2fda9f4d61f7?q=80&w=1200",
text:`Chat history revealed:

"My energy drink is sugar-free, so it should be harmless."

"Pre-workout is made for fitness. Stronger must mean better."

"Skipping meals helps burn fat faster."`,
q:"What is the biggest misconception here?",
o:["Sugar-free drinks have no physiological effects","Fitness supplements are completely risk-free","Fasted training is always healthier","All of the above are misconceptions"],a:3,
e:`Sugar-free does not mean stimulant-free.

Fitness supplements are not automatically safe when combined without limits.

For some individuals, intense exercise while fasting may increase the risk of dizziness, palpitations, and low blood sugar.`},

{title:"Investigation 5",img:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1200",
text:`Daily timeline:

Morning:
- Black coffee only

Lunch:
- Half a salad

Afternoon:
- One energy drink

Before training:
- One scoop of pre-workout

During training:
- Another energy drink

After training:
- Twenty minutes in the sauna`,
q:"Which combination is the most dangerous?",
o:["Salad and protein bar","Fasting + high caffeine intake + intense exercise + sauna","Black coffee and water","Tight shoes"],a:1,
e:`Individual factors may seem harmless by themselves.

However, stacking multiple stressors together can dramatically increase risk.

Fasting, dehydration, excessive caffeine, intense exercise, and heat exposure all place additional strain on the cardiovascular system.`},

{title:"Investigation 6",img:"https://images.unsplash.com/photo-1576678927484-cc907957088c?q=80&w=1200",
text:`His coach said:

"He lost more than one kilogram today and was really happy about it."

"He thought it meant he had burned a lot of fat."`,
q:"What does rapid weight loss during a workout usually represent?",
o:["Massive fat loss","Water loss","Muscle gain","Lighter bones"],a:1,
e:`Short-term weight changes are usually caused by water loss, not sudden fat loss.

Mistaking dehydration for successful fat burning may encourage people to continue unsafe behaviors.`},

{title:"Final Unravel",img:"https://images.unsplash.com/photo-1512678080530-7760d81faba6?q=80&w=1200",
text:`After treatment:

- Symptoms improved after intravenous fluids.
- Heart monitoring showed no persistent severe heart disease.
- Doctors asked about caffeine, supplements, exercise habits, and sauna use.

Kristine quietly replied:

"I just wanted to train more effectively."`,
q:"What most likely caused the incident?",
o:["Protein powder poisoning","Deliberate poisoning","Fasting, excessive caffeine, dehydration, and electrolyte imbalance","Incompatibility between sugar-free drinks and protein bars"],a:2,
e:`The incident was not caused by a single "bad food."

Instead, multiple stressors accumulated at the same time:

- High caffeine intake
- Inadequate food intake
- Heavy sweating
- Fluid loss
- Sauna exposure

Together, these factors created a dangerous physiological situation.`},

{title:"Key Takeaways",img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1200",
text:`- Sugar-free does not mean risk-free.
- Supplements can become dangerous when stacked together.
- Short-term weight loss is usually water loss, not fat loss.
- Fasting and intense exercise are not always the healthiest combination.
- Nutrition and fitness should focus on overall balance rather than extreme strategies.`}
]
},

{title:"Investigation 3",img:"https://images.unsplash.com/photo-1540420773420-3366772f4999?q=80&w=1200",
text:`A classmate said:

{title:"Investigation 4",img:"https://images.unsplash.com/photo-1544787219-7f47ccb76574?q=80&w=1200",

text:`Hospital examination showed:

{title:"Key Takeaways",img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1200",
text:`- Healthy eating does not mean eating less and less.

caseTitle:"The Victim of Overnight Fried Rice",
caseLabel:"Case 4",
id:"case4_overnight_fried_rice",

summary:"A food festival meal becomes dangerous after hours in a warm backpack.",
steps:[
{title:"Opening",img:"https://images.unsplash.com/photo-1603133872878-684f208fb84b?q=80&w=1200",
text:`1:40 AM. Dormitory building.

Callum rushed into the bathroom and vomited again and again.

His face was pale. His stomach cramped sharply.

His roommate said:

"He only ate a box of fried rice he brought back tonight."

On the desk, investigators found a takeout box with a food festival label:

"Golden Egg Fried Rice - Freshly Made Today"

MISSION:

Find out why Callum was the only one who got sick.`},

{title:"Investigation 1",img:"https://images.unsplash.com/photo-1565299585323-38d6b0865b47?q=80&w=1200",
text:`Investigators found:

- Half a box of fried rice
- A microwave
- Dorm room temperature: 27 degrees Celsius
- Food festival coupons in the trash
- Condensation on the bottom of the fried rice container`,
q:"At first glance, what is the most likely suspicion?",
o:["The fried rice itself was poisonous","A food festival group food poisoning event","The storage and reheating process may have been unsafe","Eggs and rice cannot be eaten together"],a:2,
e:`The key may not be how the food was originally cooked.

The real question is how the leftovers were stored afterward.`},

{title:"Investigation 2",img:"https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1200",
text:`Doctor's notes:

- The main symptom was sudden vomiting.
- Symptoms appeared quickly.
- No obvious high fever.
- Most other customers from the same stall were fine.`,
q:"What does this suggest?",
o:["It must be deliberate poisoning","The problem may not have been caused by the stall at the time of serving","Rice can never be eaten","Egg allergy"],a:1,
e:`Not everyone who ate the fried rice got sick.

That means investigators need to examine Callum's personal handling process after he bought the food.`},

{title:"Investigation 3",img:"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200",
text:`Investigators reconstructed the timeline:

4:00 PM:
Callum bought the fried rice.

5:00 PM:
He ate half of it.

5:30 PM:
He put the leftovers into his backpack.

9:30 PM:
He brought it back to the dorm.

11:40 PM:
He microwaved it for 40 seconds.

12:00 AM:
He finished eating it.

1:40 AM:
He started vomiting.`,
q:"Which time period is the most suspicious?",
o:["Before he bought the rice","The hours when the rice sat at room temperature in his backpack","When the microwave was running","When he used a spoon"],a:1,
e:`Cooked rice stayed in a warm environment for several hours.

That storage period is a major clue.`},

{title:"Investigation 4",img:"https://images.unsplash.com/photo-1585659722983-3a675dabf23d?q=80&w=1200",
text:`A roommate said:

"But he microwaved it. How could there still be a problem?"

Investigators checked the leftovers:

- The center of the rice was warm, not hot.
- He only reheated it for 40 seconds.
- The rice was clumped together.
- Heating was uneven.`,
q:"Why does reheating not always solve the problem?",
o:["Microwaves create toxins","Heating may be uneven, and some bacterial toxins are not easily removed by simple reheating","Rice loses all nutrients after reheating","Eggs become poisonous when heated"],a:1,
e:`Reheating is not a universal undo button.

If food was stored unsafely for too long, a short and uneven reheating may not make it safe again.`},

{title:"Investigation 5",img:"https://images.unsplash.com/photo-1512058564366-18510be2db19?q=80&w=1200",
text:`System evidence card:

Cooked starch foods such as rice and noodles may become risky if they stay in a warm environment for too long after cooking.

The problem is not that rice is poisonous.

The problem is cooked rice staying in the temperature danger zone for too long.`,
q:"What is the real keyword in this case?",
o:["Food incompatibility","Cooked food storage","Overnight rice can never be eaten","The fried rice was too yellow"],a:1,
e:`Not all overnight rice is dangerous.

The key questions are:

- Was it refrigerated quickly?
- Was it stored for too long?
- What was the temperature?
- Was it reheated thoroughly?

The risk comes from storage conditions, not simply from the word "overnight."`},

{title:"Investigation 6",img:"https://images.unsplash.com/photo-1571171637578-41bc2dd41cd2?q=80&w=1200",
text:`Investigators found another student who ate fried rice from the same stall.

He put his leftovers into the refrigerator within 30 minutes.

The next day, he reheated them thoroughly and felt fine.`,
q:"What does this comparison show?",
o:["Callum was simply weak","The stall was definitely not responsible","Storage method may have been the decisive difference","A refrigerator can make any bad food safe again"],a:2,
e:`The same food can lead to different outcomes depending on how it is stored.

Different storage methods can create very different risks.`},

{title:"Final Unravel",img:"https://images.unsplash.com/photo-1579684385127-1ef15d508118?q=80&w=1200",
text:`Dormitory security footage showed:

Callum's fried rice stayed in his backpack for about four hours.

The weather was hot that day.

Later, he only reheated it briefly.

Doctors judged that the symptoms matched an acute foodborne gastrointestinal reaction.`,
q:"What most likely caused the incident?",
o:["Fried rice and eggs are incompatible","Someone poisoned him","Cooked rice was left at room temperature too long, stored improperly, then eaten after simple reheating","Rice itself cannot be eaten"],a:2,
e:`The incident was not caused by rice being naturally dangerous.

The problem was improper storage of cooked rice, followed by brief and uneven reheating.`},

{title:"Key Takeaways",img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1200",
text:`- Food safety does not only happen in the kitchen.
- It also happens during the hours when leftovers sit in a backpack.
- "I reheated it" does not always mean "it is safe."
- Cooked food should be refrigerated as soon as possible.
- Leftovers should be reheated thoroughly before eating.
- The danger is not "overnight food" itself, but unsafe time and temperature control.`}
]
},

Night:

q:"What does this suggest?",
o:["Taking iron always means good absorption","Calcium, tea, and coffee may affect iron absorption","Milk turns iron supplements into poison","Iron and tea are so incompatible that they can never appear on the same day"],a:1,
e:`Taking iron does not guarantee good absorption.

Calcium, tea, and coffee may interfere with iron absorption when taken too close to the supplement.`},

{title:"Investigation 6",img:"https://images.unsplash.com/photo-1518611012118-696072aa579a?q=80&w=1200",

];

let currentCase=null;
let steps=[];
let i=0;
let unlocked=0;
let score=0;
let totalQuestions=0;
let firstTry=true;
let completedCases=JSON.parse(localStorage.getItem("nutriDetectiveCompletedCases")||"{}");
let typeToken=0;

function displayTabTitle(s){
if(s.title.startsWith("Investigation")) return "Investigation";
return s.title;
}

function showCaseSelect(){
typeToken++;
currentCase=null;
steps=[];
i=0;
unlocked=0;
main.className="main case-select-mode";
files.innerHTML="";
title.className="case-select-title";
title.textContent="Select a Case File";
story.className="case-select-subtitle";
story.textContent="";
img.style.display="none";
area.innerHTML="";

cases.forEach((c,n)=>{
let f=document.createElement("div");
let done=completedCases[c.id];
f.className="file"+(done?" completed":"");
f.textContent=c.caseLabel+": "+c.caseTitle+(done?" - Played":"");
f.onclick=()=>startCase(n);
files.appendChild(f);
});

let intro=document.createElement("div");
intro.className="game-intro";
intro.innerHTML=`<p>Dietective is an interactive mystery game where players investigate strange medical incidents through evidence and deduction.</p><p>The goal of this game is to teach nutrition literacy in a fun, story-driven way that reveals its complexity.</p>`;
area.appendChild(intro);

let grid=document.createElement("div");
grid.className="case-grid";
cases.forEach((c,n)=>{
let card=document.createElement("div");
let done=completedCases[c.id];
card.className="case-card";
card.onclick=()=>startCase(n);
let playedText=done?`<div class="played-badge">PLAYED - SCORE ${done.score}/${done.total}</div>`:"";
card.innerHTML=`<img src="${c.cover}" alt="${c.caseTitle}"><div class="case-card-body"><h2>${c.caseLabel}: ${c.caseTitle}</h2>${playedText}</div>`;
grid.appendChild(card);
});
area.appendChild(grid);
}

function startCase(n){
currentCase=cases[n];
steps=currentCase.steps;
i=0;
unlocked=0;
score=0;
totalQuestions=steps.filter(step=>step.q).length;
firstTry=true;
title.className="title";
story.className="story";
img.style.display="";
render();
}

function sidebar(){
files.innerHTML="";
let back=document.createElement("div");
back.className="file";
back.textContent="< Back to Case Files";
back.onclick=showCaseSelect;
files.appendChild(back);

steps.forEach((s,n)=>{
let d=document.createElement("div");
let locked=n>unlocked;
d.className="file"+(n===i?" active":"")+(locked?" locked":"");
d.textContent=displayTabTitle(s);
if(!locked){
d.onclick=()=>{i=n;render();};
}
files.appendChild(d);
});
}

function type(text,el){
typeToken++;
el.textContent=text;
}

function goNext(){
if(i===steps.length-1){
showCaseSelect();
}else{
unlocked=Math.max(unlocked,i+1);
i++;
render();
}
}

function render(){
sidebar();
let s=steps[i];
firstTry=true;

main.className="main";
main.classList.remove("opening-mode","investigation-mode","takeaway-mode","case-select-mode");
if(s.title==="Opening"){
main.classList.add("opening-mode");
}else if(s.title==="Key Takeaways"){
main.classList.add("takeaway-mode");
}else{
main.classList.add("investigation-mode");
}

title.className="title";
story.className="story";
title.textContent=s.title;
type(s.text,story);
img.src=s.img;
img.style.display="";
area.innerHTML="";

if(!s.q){
if(i===steps.length-1 && currentCase){
completedCases[currentCase.id]={score:score,total:totalQuestions};
localStorage.setItem("nutriDetectiveCompletedCases",JSON.stringify(completedCases));

let panel=document.createElement("div");
panel.className="score-panel";
let percent=totalQuestions?Math.round(score/totalQuestions*100):0;
let titleText=percent===100?"Perfect Detective":percent>=70?"Sharp Investigator":"Case Reviewed";
panel.innerHTML=`<h2>${titleText}</h2><p>Your first-try score:</p><p><span class="score-number">${score}/${totalQuestions}</span> (${percent}%)</p><p>Only questions answered correctly on the first attempt count toward this score.</p>`;
area.appendChild(panel);
}
let b=document.createElement("button");
b.className="btn";
b.textContent=i===steps.length-1?"BACK TO CASE FILES":"CONTINUE";
b.onclick=goNext;
area.appendChild(b);
return;
}

let q=document.createElement("div");
q.className="question";
q.innerHTML="<h3>"+s.q+"</h3>";
let feedback=document.createElement("div");
let solved=false;

s.o.forEach((op,n)=>{
let bt=document.createElement("button");
bt.className="option";
bt.textContent=op;
bt.onclick=()=>{
if(solved) return;

if(n===s.a){
solved=true;
if(firstTry){score++;}
[...q.querySelectorAll(".option")].forEach(button=>button.disabled=true);
bt.classList.add("correct");
feedback.className="msg good";
feedback.textContent=s.e+"\n\nFirst-try score: "+score+" / "+totalQuestions;

let c=document.createElement("button");
c.className="btn";
c.textContent="CONTINUE";
c.onclick=goNext;
feedback.appendChild(c);
}else{
firstTry=false;
bt.classList.add("wrong");
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),350);
feedback.className="msg bad";
feedback.textContent="Incorrect deduction. Review the evidence and choose again. This question will not count as a first-try point.";
}
};
q.appendChild(bt);
});

q.appendChild(feedback);
area.appendChild(q);
}

showCaseSelect();
</script>
</body>
</html>
